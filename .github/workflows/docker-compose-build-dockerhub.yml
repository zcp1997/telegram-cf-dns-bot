name: Build and Push Docker Image to DockerHub
on:
  push:
    tags:
      - 'v*'
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Dockerhub
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
          
      - name: Extract image name from docker-compose.yml
        id: extract-image
        run: |
          SERVICE_NAME=$(grep -A 10 'services:' docker-compose.yml | grep -v 'services:' | head -n 1 | tr -d ' :')
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT
          
      - name: Get version
        id: get-version
        run: |
          # 如果是标签触发，使用标签作为版本
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          # 否则从package.json获取版本
          else
            VERSION=$(grep '"version"' package.json | cut -d '"' -f 4)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            zcp970603/telegram-cf-dns-bot:latest
            zcp970603/telegram-cf-dns-bot:v${{ steps.get-version.outputs.version }}

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: zcp970603/telegram-cf-dns-bot
          short-description: "A telegram bot can manage your cloudflare domain dns records "
          readme-filepath: ./README.md
