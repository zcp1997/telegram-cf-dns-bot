name: Build and Push Docker Image with Docker Compose

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image name from docker-compose.yml
        id: extract-image
        run: |
          SERVICE_NAME=$(grep -A 10 'services:' docker-compose.yml | grep -v 'services:' | head -n 1 | tr -d ' :')
          IMAGE_NAME=$(grep 'image:' docker-compose.yml | head -n 1 | awk '{print $2}')
          if [ -z "$IMAGE_NAME" ]; then
            # 如果没有直接指定image字段，则使用服务名称作为默认镜像名
            IMAGE_NAME="${{ github.repository_owner }}/$(echo $SERVICE_NAME | tr '[:upper:]' '[:lower:]')"
          fi
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Get version
        id: get-version
        run: |
          # 如果是标签触发，使用标签作为版本
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          # 否则从package.json获取版本
          else
            VERSION=$(grep '"version"' package.json | cut -d '"' -f 4)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/zcp1997/telegram-cf-dns-bot:latest
            ghcr.io/zcp1997/telegram-cf-dns-bot:v${{ steps.get-version.outputs.version }}
